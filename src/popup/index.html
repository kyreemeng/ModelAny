<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ModelAny</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="console-shell">
    <header class="brand-bar">
      <div><img class="brand-mark" src="icons/icon48.png" alt=""><div><h1>ModelAny</h1><p>一次提问，多模型回答，找到更好的答案</p></div></div>
      <button id="open-options" class="icon-button" type="button" aria-label="打开设置">⚙</button>
    </header>
    <div id="toast" class="toast" aria-live="polite" hidden></div>
    <section class="panel composer" aria-labelledby="prompt-label">
      <label id="prompt-label" for="prompt">您想问什么？</label>
      <textarea id="prompt" rows="3" maxlength="10000" placeholder="输入要同时发送的问题…"></textarea>
      <div class="counter"><span>纯文本 · 本地保存</span><output id="count" for="prompt">0 / 5000</output></div>
    </section>
    <section class="formation" aria-labelledby="formation-title">
      <div class="section-heading"><div><h2 id="formation-title">模型列表</h2></div>
        <div><button id="select-all" type="button" class="text-button">全选</button><button id="clear-all" type="button" class="text-button">清空</button></div>
      </div>
      <div id="models" class="model-grid"></div>
    </section>
    <section class="controls panel">
      <label class="switch-row" for="auto-submit"><span><strong>自动发送</strong><small>文本自动发送到指定模型对话框</small></span><input id="auto-submit" type="checkbox" role="switch"></label>
      <button id="history-toggle" type="button" class="history-button" aria-controls="history" aria-expanded="false">最近记录 <span id="history-count">0</span></button>
    </section>
    <button id="send" class="send-button" type="button" disabled>请输入问题</button>
    <p class="shortcut">⌘ / Ctrl + Enter 发送</p>
    <footer>v1.0.1 · 内容仅保存在本机</footer>
    <aside id="history" class="history-drawer" aria-labelledby="history-title" hidden>
      <div class="section-heading"><h2 id="history-title">最近 20 条</h2><button id="clear-history" type="button" class="text-button danger">全部清空</button></div>
      <ol id="history-list"></ol>
      <button id="history-close" type="button" class="secondary-button">返回编队</button>
    </aside>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
